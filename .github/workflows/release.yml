name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release-main
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  test:
    name: full test suite (${{ matrix.platform }}-${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: true
      matrix:
        include:
          - runner: ubuntu-latest
            platform: linux
            arch: amd64
            python_arch: x64
          - runner: ubuntu-24.04-arm
            platform: linux
            arch: arm64
            python_arch: arm64
          - runner: windows-latest
            platform: windows
            arch: amd64
            python_arch: x64
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          architecture: ${{ matrix.python_arch }}
      - name: Verify version/manifest consistency
        shell: bash
        run: make verify-release PY=python
      - name: Full check suite
        shell: bash
        run: make check PY=python
      - name: Build standalone executable
        shell: bash
        run: make standalone PY=python
      - name: Smoke-test standalone executable
        shell: bash
        run: make smoke-standalone PY=python
      - name: Upload smoke-tested standalone executable
        uses: actions/upload-artifact@v7
        with:
          name: standalone-${{ matrix.platform }}-${{ matrix.arch }}
          path: dist/joplin-md-sync-*
          if-no-files-found: error
          retention-days: 1

  release:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Read and validate release version
        id: version
        shell: bash
        run: |
          version="$(tr -d '\r\n' < .version)"
          tag="v${version}"
          python scripts/verify_release.py --tag "${tag}"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"

      - name: Check release tag
        id: release_tag
        shell: bash
        env:
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
        run: |
          if git rev-parse --verify --quiet "refs/tags/${RELEASE_TAG}^{commit}" >/dev/null; then
            tagged_commit="$(git rev-list -n 1 "${RELEASE_TAG}")"
            if [[ "${tagged_commit}" != "${GITHUB_SHA}" ]]; then
              echo "::error::.version must be incremented: ${RELEASE_TAG} already points to ${tagged_commit}"
              exit 1
            fi
            echo "exists=true" >> "${GITHUB_OUTPUT}"
          else
            echo "exists=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Build wheel, sdist, and zipapp
        run: make build zipapp PY=python

      - name: Download smoke-tested standalone executables
        uses: actions/download-artifact@v8
        with:
          pattern: standalone-*
          path: dist
          merge-multiple: true

      - name: Write release checksums
        run: make checksums PY=python

      - name: Verify release consistency and artifacts
        env:
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
        run: >-
          make verify-release PY=python TAG="${RELEASE_TAG}"
          REQUIRE_ALL_STANDALONES=1

      - name: Smoke-test wheel and zipapp
        run: make smoke-wheel smoke-zipapp PY=python

      - name: Create release tag
        if: steps.release_tag.outputs.exists != 'true'
        shell: bash
        env:
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag --annotate "${RELEASE_TAG}" --message "Release ${RELEASE_TAG}" "${GITHUB_SHA}"
          git push origin "${RELEASE_TAG}"

      - name: Create or update GitHub release with assets
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          target_commitish: ${{ github.sha }}
          files: |
            dist/*.whl
            dist/*.tar.gz
            dist/joplin-md-sync.pyz
            dist/joplin-md-sync-linux-amd64
            dist/joplin-md-sync-linux-arm64
            dist/joplin-md-sync-windows-amd64.exe
            dist/SHA256SUMS.txt
          generate_release_notes: true
          fail_on_unmatched_files: true

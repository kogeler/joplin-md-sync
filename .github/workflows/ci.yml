name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  version:
    name: version increment
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Verify .version was incremented
        run: >-
          python scripts/check_version_increment.py
          --base-ref "${{ github.event.pull_request.base.sha }}"

  test:
    name: test (${{ matrix.platform }}-${{ matrix.arch }}, py${{ matrix.python }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            platform: linux
            arch: amd64
            python: "3.13"
            python_arch: x64
          - runner: ubuntu-latest
            platform: linux
            arch: amd64
            python: "3.14"
            python_arch: x64
          - runner: ubuntu-24.04-arm
            platform: linux
            arch: arm64
            python: "3.13"
            python_arch: arm64
          - runner: ubuntu-24.04-arm
            platform: linux
            arch: arm64
            python: "3.14"
            python_arch: arm64
          - runner: windows-latest
            platform: windows
            arch: amd64
            python: "3.13"
            python_arch: x64
          - runner: windows-latest
            platform: windows
            arch: amd64
            python: "3.14"
            python_arch: x64
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}
          architecture: ${{ matrix.python_arch }}

      # All logic lives in the Makefile so local runs and CI stay identical.
      - name: Lint (ruff)
        shell: bash
        run: make lint PY=python

      - name: Type check (mypy)
        shell: bash
        run: make typecheck PY=python

      - name: Unit and integration tests (fake Joplin server)
        shell: bash
        run: make test PY=python

      - name: Verify version/manifest consistency
        shell: bash
        run: make verify-release PY=python

      - name: Build wheel, sdist, zipapp, native executable + checksums
        shell: bash
        run: make package PY=python

      - name: Run standalone zipapp
        shell: bash
        run: make smoke-zipapp PY=python

      - name: Install wheel in a clean environment and run CLI
        shell: bash
        run: make smoke-wheel PY=python

      - name: Run native executable
        shell: bash
        run: make smoke-standalone PY=python

      - name: Verify artifacts carry no secrets
        shell: bash
        run: make verify-release PY=python

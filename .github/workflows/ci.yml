name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  version:
    name: version increment
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Verify .version was incremented
        run: >-
          python scripts/check_version_increment.py
          --base-ref "${{ github.event.pull_request.base.sha }}"

  test:
    name: test (${{ matrix.os }}, py${{ matrix.python }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python: ["3.13", "3.14"]
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}

      # All logic lives in the Makefile so local runs and CI stay identical.
      - name: Lint (ruff)
        shell: bash
        run: make lint PY=python

      - name: Type check (mypy)
        shell: bash
        run: make typecheck PY=python

      - name: Unit and integration tests (fake Joplin server)
        shell: bash
        run: make test PY=python

      - name: Verify version/manifest consistency
        shell: bash
        run: make verify-release PY=python

      - name: Build wheel, sdist, zipapp + checksums
        shell: bash
        run: make package PY=python

      - name: Run standalone zipapp
        shell: bash
        run: make smoke-zipapp PY=python

      - name: Install wheel in a clean environment and run CLI
        shell: bash
        run: make smoke-wheel PY=python

      - name: Verify artifacts carry no secrets
        shell: bash
        run: make verify-release PY=python
